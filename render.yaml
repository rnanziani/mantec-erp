# Blueprint Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mantec-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://mantec-erp-1.onrender.com

  - type: web
    name: mantec-erp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://mantec-erp.onrender.com
